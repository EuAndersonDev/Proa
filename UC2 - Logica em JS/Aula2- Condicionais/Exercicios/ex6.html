<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Exercicio 6</h1>
    <script>
        let n = parseInt(prompt("Digite um número inteiro:"));
        document.write("Antecessor de " + n + ": " + (n - 1) + "<br>");
        document.write("Número digitado: " + n + "<br>");
        document.write("Sucessor de " + n + ": " + (n + 1));
    </script>
</body>
</html>
