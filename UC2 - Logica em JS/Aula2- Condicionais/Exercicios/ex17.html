<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 17</title>
</head>
<body>
    <h1>Exercicio 17</h1>
    <script>
        let count = 0;
        for(let i = 0; i < 20; i++){
            let idade = parseInt(prompt("Digite a idade:"));
            if(idade >= 18){
                count++;
            }
        }
        document.write("O número de pessoas com 18 anos ou mais é: " + count);

    </script>
</body>
</html>
