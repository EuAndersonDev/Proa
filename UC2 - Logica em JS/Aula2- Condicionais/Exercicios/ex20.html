<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 20</title>
</head>
<body>
    <h1>Exercicio 20</h1>
    <script>
        let count = 0;
        for(let i = 0; i < 20; i++){
            let n = parseInt(prompt("Digite um número:"));
            if(n > 8){
                count++;
            }
        }
        document.write("O número de valores maiores que 8 é: " + count);
    </script>
</body>
</html>
