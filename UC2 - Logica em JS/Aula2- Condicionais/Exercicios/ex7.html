<body>
    <h1>Exercicio 7</h1>
    <script>
        let m1 = (7 + 8 + 9) / 3;
        let m2 = (6 + 5 + 4) / 3;

        document.write("Média do primeiro trimestre: " + m1.toFixed(2) + "<br>");
        document.write("Média do segundo trimestre: " + m2.toFixed(2) + "<br>");
    </script>
</body>
