<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 25</title>
</head>
<body>
    <h1>Exercicio 25</h1>
        <script>
        let soma = 0;
        while(true){
            let numero = parseInt(prompt("Digite um número (negativo para sair):"));
            if(numero < 0){
                break;
            }
            soma = soma + numero;
        }
        document.write("A soma dos números digitados é: " + soma);
    </script>
</body>
</html>
