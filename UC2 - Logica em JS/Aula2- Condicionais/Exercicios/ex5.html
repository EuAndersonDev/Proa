<body>
    <h1>Exercicio 5</h1>

    <script>
        let idade = parseInt(prompt("Digite a idade:"));
        if(idade <16){
            alert("Não eleitor");
        } else if(idade >= 16 && idade < 18 || idade > 70){
            alert("Eleitor facultativo");
        } else {
            alert("Eleitor obrigatório");
        }
    </script>
