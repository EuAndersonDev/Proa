<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 22</title>
</head>
<body>
    <h1>Exercicio 22</h1>
    <script>
        let count = 0;
        for(let i = 0; i < 20; i++){
            let n = parseInt(prompt("Digite um número inteiro:"));
            if(n > 0 && n <100){
                count++;
            }
        }
        document.write("A quantidade de números digitados é maior que 0 e menor que 100: " + count);
    </script>
</body>
</html>
