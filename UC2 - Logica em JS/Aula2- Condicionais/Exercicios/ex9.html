<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 9</title>
</head>
<body>
    <h1>Exercicio 9</h1>
    <script>
        let salarioMinimo = parseFloat(prompt("Digite o valor do salário mínimo:"));
        let salarioFuncionario = parseFloat(prompt("Digite o salário do funcionário:"));
        let quantidadeSalariosMinimos = salarioFuncionario / salarioMinimo;
        alert("O funcionário recebe " + quantidadeSalariosMinimos.toFixed(2) + " salários mínimos.");
    </script>
</body>
</html>
