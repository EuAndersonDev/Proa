<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas de Dados</title>
</head>
<body>
    <h1>Entradas de Dados</h1>

    <script>
        let num1 = parseFloat(prompt("Digite o primeiro número:"));
        document.write("Número 1: " + num1 + "<br>");
        let num2 = parseFloat(prompt("Digite o segundo número:"));
        document.write("Número 2: " + num2 + "<br> <br>");

        document.write("Soma: " + (parseFloat(num1) + parseFloat(num2)) + "<br>");
        document.write("Média: " + ((parseFloat(num1) + parseFloat(num2)) / 2) + "<br>");
        document.write("Multiplicação: " + (parseFloat(num1) * parseFloat(num2)) + "<br>");
        document.write("Divisão: " + (parseFloat(num1) / parseFloat(num2)) + "<br>");


    </script>
</body>
</html>
