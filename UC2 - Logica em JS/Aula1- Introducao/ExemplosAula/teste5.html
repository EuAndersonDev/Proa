<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media das notas</title>
</head>
<body>
    <h1>Média das Notas</h1>
    <script>
        let n1 = parseFloat(prompt("Digite a primeira nota:"));
        document.write("Nota 1: " + n1 + "<br>");
        let n2 = parseFloat(prompt("Digite a segunda nota:"));
        document.write("Nota 2: " + n2 + "<br>");
        let n3 = parseFloat(prompt("Digite a terceira nota:"));
        document.write("Nota 3: " + n3 + "<br>");
        let n4 = parseFloat(prompt("Digite a quarta nota:"));
        document.write("Nota 4: " + n4 + "<br> <br>");
        let media = (n1 + n2 + n3 + n4) / 4;
        document.write("Média: " + media + "<br>");
    </script>
</body>
</html>
