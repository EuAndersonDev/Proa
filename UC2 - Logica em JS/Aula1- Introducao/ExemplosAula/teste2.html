<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores</title>
</head>
<body>
    <h1>Testando operadores e calculo</h1>

    <script>
        let num1 = 20;
        let num2 = 40;

        let soma = num1 + num2;
        let media = (num1 + num2) / 2;
        let diferenca = num2 - num1;

        document.write("Soma: " + soma + "<br>");
        document.write("Média: " + media + "<br>");
        document.write("Diferença: " + diferenca + "<br>");
    </script>
</body>
</html>
