<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados da Pessoa</title>
</head>
<body>
    <h1>Instanciando uma pessoa</h1>

    <script>
        let nome = "Anderson"; // String
        let idade = 18; // Number int
        let altura = 1.75; // Number float
        let salario = 2500.00; // Number double
        let mestado = false; // Boolean (true ou false)

        document.write("Nome: " + nome + "<br>");
        document.write("Idade: " + idade + "<br>"); 
        document.write("Altura: " + altura + "<br>");
        document.write("Salário: " + salario + "<br>");
        document.write("Eu tenho mestrado? " + mestado + "<br> <br>");


        let nome2 = "Maria";
        let idade2 = 25;
        let altura2 = 1.65;
        let salario2 = 3000.00;
        let mestado2 = true;

        document.write("<br>Nome: " + nome2 + "<br>");
        document.write("Idade: " + idade2 + "<br>");
        document.write("Altura: " + altura2 + "<br>");
        document.write("Salário: " + salario2 + "<br>");
        document.write("Eu tenho mestrado? " + mestado2 + "<br>");

    </script>
</body>
</html>
