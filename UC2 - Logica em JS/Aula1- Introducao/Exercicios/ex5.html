<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <h1>Salário mínimo</h1>
    <script>
        let salarioMinimo = parseFloat(prompt("Digite o valor do salário mínimo:"));
        let salarioFuncionario = parseFloat(prompt("Digite o valor do salário do funcionário:"));

        let quantidadeSalarios = salarioFuncionario / salarioMinimo;

        document.write("O funcionário recebe " + quantidadeSalarios.toFixed(2) + " salários mínimos.");
    </script>
</body>
</html>
