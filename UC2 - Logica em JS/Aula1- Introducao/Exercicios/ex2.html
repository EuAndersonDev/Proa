<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1> Média de Números Fixos </h1>

    <script>
        let media1 = (8 + 7 + 9) / 3;
        let media2 = (6 + 5 + 4) / 3;
        document.write("A média dos números 8, 7 e 9 é: " + media1 + "<br>");
        document.write("A média dos números 6, 5 e 4 é: " + media2 + "<br>");
        document.write("A média geral dos números é: " + (media1 + media2));
    </script>
</body>
</html>
