<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2</title>
</head>
<body>
    <h1>Testando Switch Case</h1>

    <script>
        let dia = prompt("Digite o numero do dia da semana: (1, 2, 3, 4, 5, 6 ou 7)");

        switch (dia) {
            case "1":
                alert("Dia de descanso!");
                break;
            case "2":
                alert("Começa a semana!");
                break;
            case "3":
                alert("Meio da semana!");
                break;
            case "4":
                alert("Quarto dia da semana!");
                break;
            case "5":
                alert("Quinto dia da semana!");
                break;
            case "6":
                alert("Sexto dia da semana!");
                break;
            case "7":
                alert("Fim de semana!");
                break;
            default:
                alert("Dia inválido! Digite um dia da semana válido.");
        }
    </script>
</body>
</html>
