<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 1</title>
</head>
<body>
    <h1>Testando Switch Case</h1>

    <script>
        let semafaro = prompt("Digite a cor do semáforo: (vermelho, amarelo ou verde)");

        switch (semafaro) {
            case "vermelho":
                alert("Pare!");
                break;
            case "amarelo":
                alert("Atenção!");
                break;
            case "verde":
                alert("Siga!");
                break;
            default:
                alert("Cor inválida! Digite vermelho, amarelo ou verde.");
        }
    </script>
</body>
</html>
