<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 34</title>
  </head>
  <body>
    <h1>
      Faca um programa que leia 5 numeros inteiros usando o loop "for" e exiba a
      media aritmetica dos valores lidos.
    </h1>
    <script>
      let soma = 0;
      for (let i = 1; i <= 5; i++) {
        let numero = parseInt(prompt("Digite um numero inteiro:"));
        soma += numero;
      }

      let media = soma / 5;
      document.write("A media aritmetica dos valores lidos e: " + media);
    </script>
  </body>
</html>
