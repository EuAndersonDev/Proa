<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 39</title>
  </head>
  <body>
    <h1>
      Crie um programa que leia o nome e a idade de 5 pessoas usando o loop
      "for" e exiba a media das idades.
    </h1>
    <script>
      let somaIdades = 0;

      for (let i = 1; i <= 5; i++) {
        let nome = prompt("Digite o nome da pessoa " + i + ":");
        let idade = parseInt(prompt("Digite a idade de " + nome + ":"));
        somaIdades += idade;
      }

      let mediaIdades = somaIdades / 5;
      document.write("A media das idades e: " + mediaIdades);
    </script>
  </body>
</html>
