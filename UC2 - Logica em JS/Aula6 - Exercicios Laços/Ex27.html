<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 27</title>
  </head>
  <body>
    <h1>
      Crie um programa que exiba os numeros impares de 1 a 50 usando o loop
      "do...while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      let i = 1;

      do {
        if (i % 2 !== 0) {
          document.write(i + "<br>");
        }
        i++;
      } while (i <= 50);
    </script>
  </body>
</html>
