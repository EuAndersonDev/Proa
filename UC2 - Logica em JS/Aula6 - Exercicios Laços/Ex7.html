<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 7</title>
  </head>
  <body>
    <h1>
      Faça um programa que leia um número inteiro e exiba se ele é um número
      primo usando o loop "while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um número inteiro:"));
      let i = 2;
      let ehPrimo = true;
      while (i < numero) {
        if (numero % i === 0) {
          ehPrimo = false;
        }
        i++;
      }
      if (ehPrimo && numero > 1) {
        document.write(numero + " é um número primo.");
      } else {
        document.write(numero + " não é um número primo.");
      }
    </script>
  </body>
</html>
