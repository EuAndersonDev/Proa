<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 37</title>
  </head>
  <body>
    <h1>
      Faca um programa que leia um numero inteiro e exiba se ele e um numero
      primo usando o loop "for".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      let ehPrimo = true;

      for (let i = 2; i < numero; i++) {
        if (numero % i === 0) {
          ehPrimo = false;
        }
      }

      if (ehPrimo && numero > 1) {
        document.write(numero + " e um numero primo.");
      } else {
        document.write(numero + " nao e um numero primo.");
      }
    </script>
  </body>
</html>
