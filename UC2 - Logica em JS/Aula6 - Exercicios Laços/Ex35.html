<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 35</title>
  </head>
  <body>
    <h1>
      Escreva um programa que leia um numero inteiro e exiba a tabuada desse
      numero ate o decimo valor usando o loop "for".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      for (let i = 1; i <= 10; i++) {
        document.write(numero + " x " + i + " = " + numero * i + "<br>");
      }
    </script>
  </body>
</html>
