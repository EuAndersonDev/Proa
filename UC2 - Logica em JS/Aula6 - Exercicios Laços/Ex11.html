<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 11</title>
  </head>
  <body>
    <h1>
      Escreva um programa que leia um número inteiro e exiba a soma de todos os
      números pares entre 1 e o número lido usando o loop "while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um número inteiro:"));
      let i = 1;
      let somaPares = 0;
      while (i <= numero) {
        if (i % 2 === 0) {
          somaPares += i;
        }
        i++;
      }
      document.write(
        "A soma dos números pares entre 1 e " + numero + " é: " + somaPares,
      );
    </script>
  </body>
</html>
