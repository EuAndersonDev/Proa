<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 29</title>
  </head>
  <body>
    <h1>
      Escreva um programa que calcule o fatorial de um numero inteiro inserido
      pelo usuario usando o loop "do...while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      let i = 1;
      let fatorial = 1;

      do {
        fatorial *= i;
        i++;
      } while (i <= numero);

      document.write("O fatorial de " + numero + " e: " + fatorial);
    </script>
  </body>
</html>
