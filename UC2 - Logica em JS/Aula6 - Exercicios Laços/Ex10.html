<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 10</title>
  </head>
  <body>
    <h1>
      Faça um programa que exiba os primeiros 20 números da sequência de
      Fibonacci usando o loop "while".
    </h1>
    <script>
      let a = 0;
      let b = 1;
      let i = 0;
      while (i < 20) {
        document.write(a + "<br>");
        let temp = a + b;
        a = b;
        b = temp;
        i++;
      }
    </script>
  </body>
</html>
