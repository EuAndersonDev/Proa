<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 3</title>
  </head>
  <body>
    <h1>
      Crie um programa que exiba os números pares de 1 a 50 usando o loop
      "while".
    </h1>
    <script>
      let i = 2;
      while (i <= 50) {
        document.write(i + "<br>");
        i += 2;
      }
    </script>
  </body>
</html>
