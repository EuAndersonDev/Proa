<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 43</title>
  </head>
  <body>
    <h1>
      Faca um programa que leia um numero inteiro e exiba os seus digitos
      separadamente usando o loop "for".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));

      for (let i = 1; i <= numero; i++) {
        document.write(i + "<br>");
      }
    </script>
  </body>
</html>
