<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 28</title>
  </head>
  <body>
    <h1>
      Faca um programa que leia um numero inteiro e exiba os seus digitos
      separadamente usando o loop "do...while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      let i = 1;

      do {
        document.write(i + "<br>");
        i++;
      } while (i <= numero);
    </script>
  </body>
</html>
