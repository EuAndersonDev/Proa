<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1>Escreva um programa que calcule a soma dos números de 1 a 100 usando o loop "while"<h1>
    <script>
        let i = 1;
        let soma = 0;
        while (i <= 100) {
            soma += i;
            i++;
        }
        document.write("A soma dos números de 1 a 100 é: " + soma);
    </script>
</body>
</html>
