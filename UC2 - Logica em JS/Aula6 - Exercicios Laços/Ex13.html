<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 13</title>
  </head>
  <body>
    <h1>
      Faça um programa que leia um número inteiro e exiba os seus dígitos
      separadamente usando o loop "while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um número inteiro:"));
      let i = 1;
      while (i <= numero) {
        document.write(i + "<br>");
        i++;
      }
    </script>
  </body>
</html>
