<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 20</title>
  </head>
  <body>
    <h1>
      Escreva um programa que leia um numero inteiro e exiba a tabuada desse
      numero ate o decimo valor usando o loop "do...while".
    </h1>
    <script>
      let numero = parseInt(prompt("Digite um numero inteiro:"));
      let i = 1;

      do {
        document.write(numero + " x " + i + " = " + numero * i + "<br>");
        i++;
      } while (i <= 10);
    </script>
  </body>
</html>
