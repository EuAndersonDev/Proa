<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6</title>
</head>
<body>
    <h1>Exercicio 6</h1>
    <script>
        while(true){
            let nota1 = parseFloat(prompt("Digite a primeira nota:"));
            let nota2 = parseFloat(prompt("Digite a segunda nota:"));
            documento.write("A media das notas é: " + (nota1 + nota2) / 2);
            let resposta = prompt("Deseja calcular a média de outras notas? (s/n)");
            if(resposta.toLowerCase() !== "s"){
                break;
            }
        }
    </script>
</body>
</html>
