<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 10</title>
  </head>
  <body>
    <h1>Exercicio 10</h1>
    <script>
      let n = parseInt(
        prompt("Digite N para imprimir as tabuadas de 1 até N:"),
      );

      for (let tabuada = 1; tabuada <= n; tabuada++) {
        document.write("<strong>Tabuada do " + tabuada + "</strong><br>");

        for (let i = 1; i <= 10; i++) {
          document.write(tabuada + " x " + i + " = " + tabuada * i + "<br>");
        }

        document.write("<br>");
      }
    </script>
  </body>
</html>
