<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercicio 4</title>
  </head>
  <body>
    <h1>Exercicio 4</h1>
    <script>
      let soma = 0;
      let quantidade = 85;

      for (let i = 15; i <= 100; i++) {
        soma += i;
      }

      let media = soma / quantidade;
      document.write(
        "A média aritmética dos números inteiros entre 15 e 100 é: " + media.toFixed(2),
      );
    </script>
  </body>
</html>
