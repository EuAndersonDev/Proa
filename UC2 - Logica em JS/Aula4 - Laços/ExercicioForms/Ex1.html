<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 1</title>
</head>
<body>
    <h1>Exercicio 1</h1>
    <script>
        while (true) {
            let n1 = parseFloat(prompt("Digite o primeiro número:"));
            let n2 = parseFloat(prompt("Digite o segundo número:"));
            if(n1 <= 0){
                alert("O primeiro número deve ser maior que zero. Tente novamente.");
                continue;
            } else if(n2 <= 0){
                alert("O segundo número deve ser maior que zero. Tente novamente.");
                continue;
            } else {
                let resultado = n1 / n2;
                alert("O resultado da divisão é: " + resultado);
                break;
            }
        }
    </script>
</body>
</html>
