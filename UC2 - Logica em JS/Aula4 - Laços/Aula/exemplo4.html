<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do While</title>
  </head>
  <body>
    <h1>Testando o Do While</h1>
    <script>
      let tabuada = parseInt(prompt("Digite um número para ver a tabuada:"));
      let i = 0;
      do {
          document.write(tabuada + " x " + i + " = " + (tabuada * i) + "<br>");
          i++;
      } while (i <= 10);
    </script>
  </body>
</html>
