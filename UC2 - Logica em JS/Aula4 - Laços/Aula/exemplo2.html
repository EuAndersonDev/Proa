<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For</title>
</head>
<body>
    <h1>Numeros de 1 a 100</h1>
    <script>
        for (let i = 0; i <= 100; i+=2) {
            document.write(i + "<br>");
        }
    </script>
</body>
</html>
