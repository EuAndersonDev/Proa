<script>
    let lista = [];
    let count = 0;
    for(let i=0; i<10; i++){
        let valor = prompt(`Digite o valor ${i+1}:`);
        lista.push(valor);
        if(Number(valor)>0){
            count++;
        }
    }

    console.log(`A quantidade de números positivos é: ${count}`);
</script>
