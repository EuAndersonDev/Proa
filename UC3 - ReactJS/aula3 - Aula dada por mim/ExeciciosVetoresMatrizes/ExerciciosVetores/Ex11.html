<script>
    let lista = [];
    let somaP = 0;
    let somaN = 0;
    for(let i=0; i<5; i++){
        let valor = prompt(`Digite o valor ${i+1}:`);
        lista.push(valor);
        if(Number(valor) > 0){
            somaP += Number(valor);
        } else if(Number(valor) < 0){
            somaN += Number(valor);
        }
    }
    console.log(`A soma dos números positivos é: ${somaP}`);
    console.log(`A soma dos números negativos é: ${somaN}`);
</script>
