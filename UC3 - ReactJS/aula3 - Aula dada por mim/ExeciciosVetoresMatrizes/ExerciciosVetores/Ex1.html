<body>
    <script>
        // ExercÃ­cio 1: Criar um vetor com 5 elementos e exibir os valores ao contrÃ¡rio.
        // Declara uma variavel para uso no exercicio.
        let lista = [];
        // Inicia um laco de repeticao.
        for (let i = 0; i < 5; i++) {
            // Declara uma variavel para uso no exercicio.
            let valor = prompt(`Digite o valor ${i + 1}:`);
            // Adiciona um item no vetor.
            lista.push(valor);
        // Fecha um bloco de codigo.
        }
        // Inicia um laco de repeticao.
        for (let i = lista.length - 1; i >= 0; i--) {
            // Exibe informacoes no console.
            console.log(`Valor ${i + 1}: ${lista[i]}`);
        // Fecha um bloco de codigo.
        }
    </script>
