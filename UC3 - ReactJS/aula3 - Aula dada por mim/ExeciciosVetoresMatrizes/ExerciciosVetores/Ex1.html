<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <script>
        // Exercício 1: Criar um vetor com 5 elementos e exibir os valores ao contrário.
        let lista = [];
        for (let i = 0; i < 5; i++) {
            let valor = prompt(`Digite o valor ${i + 1}:`);
            lista.push(valor);
        }
        for (let i = lista.length - 1; i >= 0; i--) {
            console.log(`Valor ${i + 1}: ${lista[i]}`);
        }
    </script>
</body>
</html>
