<script>
    //21) Crie um programa que leia uma matriz 4x4 de números inteiros e exiba a média aritmética dos elementos.
    let n=4,m=4;
    let matriz = [];
    let soma = 0;
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        matriz[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            matriz[i][j] = valor;
            soma += matriz[i][j];
        }
    }
    let media = soma / (n * m);
    console.log("Média aritmética dos elementos da matriz: " + media);

</script>
