<script>
    //28)FaÃ§a um programa que leia uma matriz 4x4 de nÃºmeros inteiros e exiba o maior valor presente em cada linha.
    // Declara uma variavel para uso no exercicio.
    let n=4,m=4;
    // Declara uma variavel para uso no exercicio.
    let matriz = [];
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        // Executa esta instrucao do exercicio.
        matriz[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            // Executa esta instrucao do exercicio.
            matriz[i][j] = valor;
        // Fecha um bloco de codigo.
        }
    // Fecha um bloco de codigo.
    }
    // Exibe informacoes no console.
    console.log("Maior valor presente em cada linha:");
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Calcula o maior valor entre os elementos.
        console.log(`Linha ${i+1}: ${Math.max(...matriz[i])}`);
    // Fecha um bloco de codigo.
    }
    
</script>
