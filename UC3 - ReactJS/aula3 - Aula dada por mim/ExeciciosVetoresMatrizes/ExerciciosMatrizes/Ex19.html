<script>
    // Declara uma variavel para uso no exercicio.
    let n=2,m=2;
    // Declara uma variavel para uso no exercicio.
    let matriz = [];
    // Declara uma variavel para uso no exercicio.
    let soma = 0;
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        // Executa esta instrucao do exercicio.
        matriz[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            // Executa esta instrucao do exercicio.
            matriz[i][j] = valor;
        // Fecha um bloco de codigo.
        }
        // Atualiza o valor acumulado da variavel.
        soma += matriz[i][0] + matriz[i][1];
    // Fecha um bloco de codigo.
    }
    // Exibe informacoes no console.
    console.log(matriz);
    // Exibe informacoes no console.
    console.log("Soma dos elementos da matriz: " + soma);

    // Declara uma variavel para uso no exercicio.
    let o=2,p=2;
    // Declara uma variavel para uso no exercicio.
    let matriz2 = [];
    // Declara uma variavel para uso no exercicio.
    let soma2 = 0;
    // Inicia um laco de repeticao.
    for(let i=0; i<o; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        // Executa esta instrucao do exercicio.
        matriz2[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<p; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            // Executa esta instrucao do exercicio.
            matriz2[i][j] = valor;
        // Fecha um bloco de codigo.
        }
        // Atualiza o valor acumulado da variavel.
        soma2 += matriz2[i][0] + matriz2[i][1];
    // Fecha um bloco de codigo.
    }
    // Exibe informacoes no console.
    console.log(matriz2);
    // Exibe informacoes no console.
    console.log("Soma dos elementos da matriz: " + soma2);
    // Exibe informacoes no console.
    console.log(" ")
    // Exibe informacoes no console.
    console.log("Soma das duas matrizes: " + (soma + soma2));
</script>
