<script>
    //29) Escreva um programa que leia uma matriz 3x3 de números inteiros e verifique se ela é uma matriz identidade.
    let n=3,m=3;
    let matriz = [];
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        matriz[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            matriz[i][j] = valor;
        }
    }
    let identidade = true;
    for(let i=0; i<n; i++){
        for(let j=0; j<m; j++){
            if((i === j && matriz[i][j] !== 1) || (i !== j && matriz[i][j] !== 0)){
                identidade = false;
                break;
            }
        }
        if(!identidade){
            break;
        }
    }
    if(identidade){
        console.log("A matriz é uma matriz identidade.");
    } else {
        console.log("A matriz não é uma matriz identidade.");
    }
    
</script>
