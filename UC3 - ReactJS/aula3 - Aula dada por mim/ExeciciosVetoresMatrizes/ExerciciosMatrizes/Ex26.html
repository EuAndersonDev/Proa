<script>
    //26) Escreva um programa que leia duas matrizes 2x2 de nÃºmeros inteiros e verifique se elas sÃ£o iguais.
    // Declara uma variavel para uso no exercicio.
    let n=2,m=2;
    // Declara uma variavel para uso no exercicio.
    let matrizA = [];
    // Declara uma variavel para uso no exercicio.
    let matrizB = [];
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz A`));
        // Executa esta instrucao do exercicio.
        matrizA[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz A`));
            // Executa esta instrucao do exercicio.
            matrizA[i][j] = valor;
        // Fecha um bloco de codigo.
        }
    // Fecha um bloco de codigo.
    }
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz B`));
        // Executa esta instrucao do exercicio.
        matrizB[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz B`));
            // Executa esta instrucao do exercicio.
            matrizB[i][j] = valor;
        // Fecha um bloco de codigo.
        }
    // Fecha um bloco de codigo.
    }
    // Declara uma variavel para uso no exercicio.
    let iguais = true;
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Verifica uma condicao para decidir o fluxo.
            if(matrizA[i][j] !== matrizB[i][j]){
                // Atribui um valor para a variavel.
                iguais = false;
                // Executa esta instrucao do exercicio.
                break;
            // Fecha um bloco de codigo.
            }
        // Fecha um bloco de codigo.
        }
        // Verifica uma condicao para decidir o fluxo.
        if(!iguais){
            // Executa esta instrucao do exercicio.
            break;
        // Fecha um bloco de codigo.
        }
    // Fecha um bloco de codigo.
    }
    // Verifica uma condicao para decidir o fluxo.
    if(iguais){
        // Exibe informacoes no console.
        console.log("As matrizes A e B sÃ£o iguais.");
    // Fecha o bloco anterior e abre o bloco do else.
    } else {
        // Exibe informacoes no console.
        console.log("As matrizes A e B nÃ£o sÃ£o iguais.");
    // Fecha um bloco de codigo.
    }
</script>
