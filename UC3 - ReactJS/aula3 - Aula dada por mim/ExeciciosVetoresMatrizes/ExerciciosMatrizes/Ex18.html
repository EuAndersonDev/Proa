<script>
    let n=2,m=2;
    let matriz = [];
    let somaDiagonal = 0;
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        matriz[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            matriz[i][j] = valor;
        }
        somaDiagonal += matriz[i][i];
    }
    console.log(matriz);
    console.log("Soma dos elementos da diagonal principal: " + somaDiagonal);
</script>
