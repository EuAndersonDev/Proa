<script>

        for(let j=0; j<m; j++){
            // Verifica uma condicao para decidir o fluxo.
            if(matriz[i][j] !== matriz[j][i]){

            // Fecha um bloco de codigo.
            }

        }

    }
    // Verifica uma condicao para decidir o fluxo.
    if(simetrica){
        // Exibe informacoes no console.
        console.log("A matriz Ã© simÃ©trica.");
    // Fecha o bloco anterior e abre o bloco do else.
    } else {
        // Exibe informacoes no console.
        console.log("A matriz nÃ£o Ã© simÃ©trica.");
    // Fecha um bloco de codigo.
    }
    
</script>
