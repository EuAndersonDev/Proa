<script>
    //27) Crie um programa que leia uma matriz 3x3 de nÃºmeros inteiros e exiba o produto dos elementos da diagonal secundÃ¡ria.

    // Declara uma variavel para uso no exercicio.
    let n=3,m=3;
    // Declara uma variavel para uso no exercicio.
    let matriz = [];
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Declara uma variavel para uso no exercicio.
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        // Executa esta instrucao do exercicio.
        matriz[i] = [valor];

        // Inicia um laco de repeticao.
        for(let j=0; j<m; j++){
            // Solicita um valor digitado pelo usuario.
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            // Executa esta instrucao do exercicio.
            matriz[i][j] = valor;
        // Fecha um bloco de codigo.
        }
    // Fecha um bloco de codigo.
    }
    // Declara uma variavel para uso no exercicio.
    let produtoDiagonalSecundaria = 1;
    // Inicia um laco de repeticao.
    for(let i=0; i<n; i++){
        // Executa esta instrucao do exercicio.
        produtoDiagonalSecundaria *= matriz[i][m - 1 - i];
    // Fecha um bloco de codigo.
    }
    // Exibe informacoes no console.
    console.log("Produto dos elementos da diagonal secundÃ¡ria: " + produtoDiagonalSecundaria);
</script>
