<script>
    //30) Crie um programa que leia duas matrizes 2x2 de números inteiros e exiba a subtração
    let n=2,m=2;
    let matrizA = [];
    let matrizB = [];
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz A`));
        matrizA[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz A`));
            matrizA[i][j] = valor;
        }
    }
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz B`));
        matrizB[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz B`));
            matrizB[i][j] = valor;
        }
    }
    let subtracao = [];
    for(let i=0; i<n; i++){
        subtracao[i] = [];
        for(let j=0; j<m; j++){
            subtracao[i][j] = matrizA[i][j] - matrizB[i][j];
        }
    }
    console.log("Subtração das matrizes A e B:");
    console.log(subtracao);
    
</script>
