<script>
    //23) Escreva um programa que leia uma matriz 3x3 de números inteiros e exiba o menor valor presente na matriz.
    let n=3,m=3;
    let matriz = [];
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1}`));
        matriz[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1}`));
            matriz[i][j] = valor;
        }
    }
    let menor = matriz[0][0];
    for(let i=0; i<n; i++){
        for(let j=0; j<m; j++){
            if(matriz[i][j] < menor){
                menor = matriz[i][j];
            }
        }
    }
    console.log("Menor valor presente na matriz: " + menor);

</script>
