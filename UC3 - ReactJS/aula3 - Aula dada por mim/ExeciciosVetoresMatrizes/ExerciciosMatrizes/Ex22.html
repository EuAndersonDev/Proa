<script>
    //22) Faça um programa que leia duas matrizes 2x2 de números inteiros e exiba o produto entre elas.
    let n=2,m=2;
    let matrizA = [];
    let matrizB = [];
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz A`));
        matrizA[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz A`));
            matrizA[i][j] = valor;
        }
    }
    for(let i=0; i<n; i++){
        let valor = parseInt(prompt(`Digite o valor da linha ${i+1} da matriz B`));
        matrizB[i] = [valor];

        for(let j=0; j<m; j++){
            valor = parseInt(prompt(`Digite o valor da coluna ${j+1} da matriz B`));
            matrizB[i][j] = valor;
        }
    }
    let produto = [];
    for(let i=0; i<n; i++){
        produto[i] = [];
        for(let j=0; j<m; j++){
            produto[i][j] = matrizA[i][0] * matrizB[0][j] + matrizA[i][1] * matrizB[1][j];
        }
    }
    console.log("Produto das matrizes A e B:");
    console.log(produto);
    
</script>
